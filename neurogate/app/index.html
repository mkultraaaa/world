<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroGate — Онбординг</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 480px;
    padding: 24px 20px;
    position: relative;
  }

  /* Steps */
  .step {
    display: none;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .step.active {
    display: flex;
    opacity: 1;
  }

  .step.fade-out {
    opacity: 0;
  }

  /* Logo */
  .logo {
    margin-bottom: 28px;
  }

  /* Typography */
  h1 {
    font-size: 32px;
    font-weight: 700;
    text-align: center;
    line-height: 1.25;
    margin-bottom: 12px;
  }

  h2 {
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 24px;
  }

  .subtitle {
    font-size: 16px;
    color: #6b7280;
    text-align: center;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* Primary button */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #7C3AED;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
    width: 100%;
    max-width: 320px;
    margin-top: 8px;
  }

  .btn-primary:hover {
    background: #6D28D9;
  }

  .btn-primary:active {
    transform: scale(0.98);
  }

  /* Step 2 — Interest cards */
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    margin-bottom: 28px;
  }

  .interest-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 120px;
    background: #fff;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.2s ease, background 0.2s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .interest-card:hover {
    border-color: #c4b5fd;
  }

  .interest-card.selected {
    border-color: #7C3AED;
    background: #f5f3ff;
  }

  .interest-card .emoji {
    font-size: 32px;
    margin-bottom: 8px;
  }

  .interest-card .label {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a2e;
  }

  /* Step 3 — Chat */
  .chat-container {
    width: 100%;
    background: #f3f4f6;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
    min-height: 260px;
    display: flex;
    flex-direction: column;
  }

  .chat-messages {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
    min-height: 40px;
  }

  .chat-bubble {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: bubble-in 0.3s ease;
  }

  @keyframes bubble-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .chat-bubble.user {
    align-self: flex-end;
    background: #7C3AED;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .chat-bubble.ai {
    align-self: flex-start;
    background: #fff;
    color: #1a1a2e;
    border: 1px solid #e5e7eb;
    border-bottom-left-radius: 4px;
    white-space: pre-line;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    align-self: flex-start;
    padding: 12px 20px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
  }

  .typing span {
    width: 8px;
    height: 8px;
    background: #9ca3af;
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
  }

  .chat-input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s ease;
    background: #fff;
  }

  .chat-input:focus {
    border-color: #7C3AED;
  }

  .btn-send {
    background: #7C3AED;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: background 0.2s ease;
    white-space: nowrap;
  }

  .btn-send:hover {
    background: #6D28D9;
  }

  .btn-send:disabled {
    background: #c4b5fd;
    cursor: not-allowed;
  }

  /* Step 4 — Info items */
  .info-items {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .info-item {
    background: #f5f3ff;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    color: #6D28D9;
  }

  /* Step indicator dots */
  .step-dots {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 28px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #e5e7eb;
    transition: background 0.3s ease, width 0.3s ease;
  }

  .dot.active {
    background: #7C3AED;
    width: 24px;
    border-radius: 4px;
  }

  /* Responsive */
  @media (max-width: 380px) {
    h1 { font-size: 26px; }
    h2 { font-size: 20px; }
    .cards-grid { gap: 8px; }
    .interest-card { height: 100px; }
    .interest-card .emoji { font-size: 26px; }
    .btn-primary { padding: 12px 32px; font-size: 15px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Step 1: Welcome -->
  <div class="step active" data-step="1">
    <div class="logo">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="23" height="23" rx="3.5" fill="#7C3AED"/>
        <rect x="31" y="2" width="23" height="23" rx="3.5" fill="#7C3AED"/>
        <rect x="2" y="31" width="23" height="23" rx="3.5" fill="#7C3AED"/>
        <rect x="31" y="31" width="23" height="23" rx="3.5" fill="#7C3AED"/>
      </svg>
    </div>
    <h1>Добро пожаловать в NeuroGate!</h1>
    <p class="subtitle">Все нейросети мира в одном месте</p>
    <button class="btn-primary" onclick="goToStep(2)">Начать</button>
    <div class="step-dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Step 2: Interests -->
  <div class="step" data-step="2">
    <h2>Что вас интересует больше всего?</h2>
    <div class="cards-grid">
      <div class="interest-card" onclick="toggleCard(this)">
        <span class="emoji">&#x1F4DD;</span>
        <span class="label">Тексты</span>
      </div>
      <div class="interest-card" onclick="toggleCard(this)">
        <span class="emoji">&#x1F3A8;</span>
        <span class="label">Изображения</span>
      </div>
      <div class="interest-card" onclick="toggleCard(this)">
        <span class="emoji">&#x1F3AC;</span>
        <span class="label">Видео</span>
      </div>
      <div class="interest-card" onclick="toggleCard(this)">
        <span class="emoji">&#x1F4BB;</span>
        <span class="label">Код</span>
      </div>
    </div>
    <button class="btn-primary" onclick="goToStep(3)">Продолжить</button>
    <div class="step-dots">
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Step 3: Try it -->
  <div class="step" data-step="3">
    <h2>Попробуйте прямо сейчас — бесплатно!</h2>
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row" id="chatInputRow">
        <input type="text" class="chat-input" id="chatInput" value="Напиши 3 идеи для стартапа в сфере AI" readonly>
        <button class="btn-send" id="btnSend" onclick="sendMessage()">Отправить</button>
      </div>
    </div>
    <button class="btn-primary" id="btnContinueChat" style="display: none;" onclick="goToStep(4)">Продолжить</button>
    <div class="step-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- Step 4: Done -->
  <div class="step" data-step="4">
    <h1>&#x1F389; Отлично! Вы готовы к работе</h1>
    <p class="subtitle">У вас 20 бесплатных запросов в день</p>
    <div class="info-items">
      <div class="info-item">100+ моделей</div>
      <div class="info-item">Без VPN</div>
      <div class="info-item">Оплата в рублях</div>
    </div>
    <a href="/neurogate/app/cabinet" style="text-decoration: none; width: 100%; display: flex; justify-content: center;">
      <button class="btn-primary">Перейти в кабинет</button>
    </a>
    <div class="step-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot active"></div>
    </div>
  </div>

</div>

<script>
  var currentStep = 1;

  function goToStep(n) {
    var current = document.querySelector('.step[data-step="' + currentStep + '"]');
    var next = document.querySelector('.step[data-step="' + n + '"]');
    if (!current || !next) return;

    current.classList.add('fade-out');

    setTimeout(function () {
      current.classList.remove('active', 'fade-out');
      next.classList.add('active');
      currentStep = n;
      // Force reflow before removing opacity:0
      void next.offsetWidth;
    }, 300);
  }

  function toggleCard(el) {
    el.classList.toggle('selected');
  }

  function sendMessage() {
    var input = document.getElementById('chatInput');
    var messages = document.getElementById('chatMessages');
    var inputRow = document.getElementById('chatInputRow');
    var btnSend = document.getElementById('btnSend');
    var promptText = input.value;

    if (!promptText) return;

    btnSend.disabled = true;

    // Show user message
    var userBubble = document.createElement('div');
    userBubble.className = 'chat-bubble user';
    userBubble.textContent = promptText;
    messages.appendChild(userBubble);

    // Hide input row
    inputRow.style.display = 'none';

    // Show typing indicator
    var typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(typing);

    // After 1.5s show AI response
    setTimeout(function () {
      messages.removeChild(typing);

      var aiBubble = document.createElement('div');
      aiBubble.className = 'chat-bubble ai';
      aiBubble.textContent =
        '1. AI-ассистент для малого бизнеса — автоматизация рутинных задач\n' +
        '2. Платформа для генерации маркетингового контента\n' +
        '3. Умный переводчик с адаптацией под контекст';
      messages.appendChild(aiBubble);

      // Show continue button
      document.getElementById('btnContinueChat').style.display = '';
    }, 1500);
  }
</script>

</body>
</html>
