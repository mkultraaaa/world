<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Галерея — NeuroGate</title>
<style>
:root {
  --purple: #7C3AED;
  --purple-dark: #6D28D9;
  --purple-light: #A78BFA;
  --purple-bg: #EDE9FE;
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-500: #6B7280;
  --gray-600: #4B5563;
  --gray-900: #111827;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F5F5F3; color: var(--gray-900); }

/* Sidebar */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 220px; background: #F7F7F5;
  border-right: 1px solid #E5E5E3;
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform 0.25s ease;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 16px 24px;
}
.sidebar-logo svg { flex-shrink: 0; }
.sidebar-logo span { font-weight: 800; font-size: 16px; color: var(--gray-900); }
.sidebar-nav { flex: 1; display: flex; flex-direction: column; padding: 0 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-radius: 8px;
  font-size: 14px; color: #666;
  text-decoration: none; cursor: pointer;
  transition: background 0.15s, color 0.15s;
  margin-bottom: 2px;
}
.nav-item:hover { background: #EEEEEC; color: var(--gray-900); }
.nav-item.active { background: var(--purple-bg); color: var(--purple); font-weight: 600; }
.nav-item-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-bottom { padding: 8px; border-top: 1px solid #E5E5E3; }
.sidebar-bottom .nav-item { margin-bottom: 0; }

/* Burger */
.burger {
  display: none; position: fixed; top: 12px; left: 12px;
  z-index: 1001; background: #fff; border: 1px solid #E5E5E3;
  border-radius: 8px; width: 40px; height: 40px;
  cursor: pointer; align-items: center; justify-content: center;
  font-size: 20px;
}
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.3); z-index: 999;
}
.overlay.show { display: block; }

/* Main */
.main { margin-left: 220px; min-height: 100vh; padding: 32px; }
.page-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.page-subtitle { font-size: 14px; color: var(--gray-500); margin-bottom: 24px; }

/* Filters */
.filters-row {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
}
.filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-pill {
  padding: 7px 16px; border-radius: 20px; font-size: 13px;
  border: 1px solid #E5E5E3; background: #fff; color: var(--gray-600);
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.filter-pill:hover { border-color: var(--purple-light); }
.filter-pill.active {
  background: var(--purple); color: #fff; border-color: var(--purple);
}

/* Gallery Grid */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
.gallery-card {
  position: relative; border-radius: 12px; overflow: hidden;
  aspect-ratio: 1; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.gallery-card:hover {
  transform: scale(1.02);
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}
.gallery-card-bg {
  width: 100%; height: 100%;
}
.gallery-card-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 32px 12px 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.6));
}
.gallery-card-title {
  color: #fff; font-size: 12px; font-weight: 500;
}

/* Mobile */
@media (max-width: 767px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .burger { display: flex; }
  .main { margin-left: 0; padding: 20px; padding-top: 60px; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<button class="burger" onclick="toggleSidebar()">&#9776;</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect x="1" y="1" width="11" height="11" rx="3.5" fill="#7C3AED"/>
      <rect x="16" y="1" width="11" height="11" rx="3.5" fill="#7C3AED"/>
      <rect x="1" y="16" width="11" height="11" rx="3.5" fill="#7C3AED"/>
      <rect x="16" y="16" width="11" height="11" rx="3.5" fill="#7C3AED"/>
    </svg>
    <span>NeuroGate</span>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="index.html"><span class="nav-item-icon">&#127968;</span> Главная</a>
    <a class="nav-item" href="chat.html"><span class="nav-item-icon">&#128172;</span> Чат</a>
    <a class="nav-item" href="images.html"><span class="nav-item-icon">&#128444;</span> Изображения</a>
    <a class="nav-item" href="video.html"><span class="nav-item-icon">&#127916;</span> Видео</a>
    <a class="nav-item active" href="gallery.html"><span class="nav-item-icon">&#128248;</span> Галерея</a>
    <a class="nav-item" href="prompts.html"><span class="nav-item-icon">&#128203;</span> Промпты</a>
    <a class="nav-item" href="models.html"><span class="nav-item-icon">&#129302;</span> Модели</a>
  </nav>
  <div class="sidebar-bottom">
    <a class="nav-item" href="settings.html"><span class="nav-item-icon">&#9881;</span> Настройки</a>
  </div>
</aside>

<main class="main">
  <h1 class="page-title">Public Gallery</h1>
  <p class="page-subtitle">Творения сообщества NeuroGate</p>

  <div class="filters-row">
    <div class="filter-group" id="typeFilters">
      <div class="filter-pill active">Все</div>
      <div class="filter-pill">Изображения</div>
      <div class="filter-pill">Видео</div>
    </div>
    <div class="filter-group" id="sortFilters">
      <div class="filter-pill active">Новые</div>
      <div class="filter-pill">Популярные</div>
    </div>
  </div>

  <div class="gallery-grid" id="galleryGrid"></div>
</main>

<script>
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

const galleryItems = [
  { title: 'Закат в горах', gradient: 'linear-gradient(135deg, #7C3AED, #F97316)' },
  { title: 'Космический пейзаж', gradient: 'linear-gradient(135deg, #1e1b4b, #7C3AED)' },
  { title: 'Портрет кота', gradient: 'linear-gradient(135deg, #F97316, #EC4899)' },
  { title: 'Абстрактная геометрия', gradient: 'linear-gradient(135deg, #0D9488, #3B82F6)' },
  { title: 'Городской пейзаж', gradient: 'linear-gradient(135deg, #6B7280, #3B82F6)' },
  { title: 'Фэнтези замок', gradient: 'linear-gradient(135deg, #7C3AED, #EC4899)' },
  { title: 'Подводный мир', gradient: 'linear-gradient(135deg, #2563EB, #0D9488)' },
  { title: 'Робот-помощник', gradient: 'linear-gradient(135deg, #6B7280, #7C3AED)' },
  { title: 'Весенний сад', gradient: 'linear-gradient(135deg, #16A34A, #EAB308)' },
  { title: 'Киберпанк город', gradient: 'linear-gradient(135deg, #EC4899, #3B82F6)' },
  { title: 'Милый щенок', gradient: 'linear-gradient(135deg, #F97316, #92400E)' },
  { title: 'Северное сияние', gradient: 'linear-gradient(135deg, #16A34A, #7C3AED)' },
];

const grid = document.getElementById('galleryGrid');
galleryItems.forEach(item => {
  const card = document.createElement('div');
  card.className = 'gallery-card';
  card.innerHTML = `
    <div class="gallery-card-bg" style="background: ${item.gradient};"></div>
    <div class="gallery-card-overlay">
      <div class="gallery-card-title">${item.title}</div>
    </div>
  `;
  grid.appendChild(card);
});

// Filter pill toggling
document.querySelectorAll('.filter-group').forEach(group => {
  group.addEventListener('click', e => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    group.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
  });
});
</script>
</body>
</html>
