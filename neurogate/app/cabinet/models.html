<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Модели — NeuroGate</title>
<style>
:root {
  --purple: #7C3AED;
  --purple-dark: #6D28D9;
  --purple-light: #A78BFA;
  --purple-bg: #EDE9FE;
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-500: #6B7280;
  --gray-600: #4B5563;
  --gray-900: #111827;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F5F5F3; color: var(--gray-900); }

/* Sidebar */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 220px; background: #F7F7F5;
  border-right: 1px solid #E5E5E3;
  display: flex; flex-direction: column;
  z-index: 100;
  transition: transform 0.25s ease;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 20px 16px 24px;
}
.sidebar-logo svg { flex-shrink: 0; }
.sidebar-logo span { font-weight: 800; font-size: 16px; color: var(--gray-900); }
.sidebar-nav { flex: 1; display: flex; flex-direction: column; padding: 0 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-radius: 8px;
  font-size: 14px; color: #666;
  text-decoration: none; cursor: pointer;
  transition: background 0.15s, color 0.15s;
  margin-bottom: 2px;
}
.nav-item:hover { background: #EEEEEC; color: var(--gray-900); }
.nav-item.active { background: var(--purple-bg); color: var(--purple); font-weight: 600; }
.nav-item-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-bottom { padding: 8px; border-top: 1px solid #E5E5E3; }
.sidebar-bottom .nav-item { margin-bottom: 0; }

/* Burger */
.burger {
  display: none; position: fixed; top: 12px; left: 12px;
  z-index: 1001; background: #fff; border: 1px solid #E5E5E3;
  border-radius: 8px; width: 40px; height: 40px;
  cursor: pointer; align-items: center; justify-content: center;
  font-size: 20px;
}
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.3); z-index: 999;
}
.overlay.show { display: block; }

/* Main */
.main { margin-left: 220px; min-height: 100vh; padding: 32px; }
.page-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.page-subtitle { font-size: 14px; color: var(--gray-500); margin-bottom: 24px; }

/* Tabs */
.tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
}
.tab-item {
  padding: 10px 16px; font-size: 14px; color: var(--gray-500);
  cursor: pointer; border: 1px solid #E5E5E3; border-radius: 8px;
  transition: all 0.15s; display: flex; align-items: center; gap: 6px;
  user-select: none; background: #fff;
}
.tab-item:hover { border-color: var(--purple-light); }
.tab-item.active { border-color: var(--purple); color: var(--gray-900); font-weight: 600; }
.tab-badge {
  background: var(--purple-bg); color: var(--purple); font-size: 11px;
  padding: 1px 7px; border-radius: 10px; font-weight: 600;
}

/* Filters */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filter-pill {
  padding: 7px 16px; border-radius: 20px; font-size: 13px;
  border: 1px solid #E5E5E3; background: #fff; color: var(--gray-600);
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.filter-pill:hover { border-color: var(--purple-light); }
.filter-pill.active { background: var(--purple); color: #fff; border-color: var(--purple); }

/* Search */
.search-input {
  width: 300px; max-width: 100%; padding: 10px 14px 10px 36px;
  border: 1px solid #E5E5E3; border-radius: 10px; font-size: 14px;
  background: #fff; color: var(--gray-900);
  outline: none; transition: border-color 0.15s;
  margin-bottom: 24px;
}
.search-input:focus { border-color: var(--purple-light); }
.search-wrap {
  position: relative; margin-bottom: 24px;
}
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--gray-500); font-size: 14px; pointer-events: none;
}

/* Model Cards Grid */
.models-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.model-card {
  border-radius: 12px; overflow: hidden;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}
.model-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}
.model-card-gradient {
  height: 140px; padding: 16px;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.model-provider {
  font-size: 10px; color: rgba(255,255,255,0.7);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.model-name {
  font-size: 18px; font-weight: 700; color: #fff;
}
.model-tags {
  padding: 12px 16px;
  background: #fff;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.model-tag {
  font-size: 11px; color: var(--gray-500);
}

/* Mobile */
@media (max-width: 767px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .burger { display: flex; }
  .main { margin-left: 0; padding: 20px; padding-top: 60px; }
  .models-grid { grid-template-columns: 1fr; }
  .search-input { width: 100%; }
}
</style>
</head>
<body>

<button class="burger" onclick="toggleSidebar()">&#9776;</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect x="1" y="1" width="11" height="11" rx="3.5" fill="#7C3AED"/>
      <rect x="16" y="1" width="11" height="11" rx="3.5" fill="#7C3AED"/>
      <rect x="1" y="16" width="11" height="11" rx="3.5" fill="#7C3AED"/>
      <rect x="16" y="16" width="11" height="11" rx="3.5" fill="#7C3AED"/>
    </svg>
    <span>NeuroGate</span>
  </div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="index.html"><span class="nav-item-icon">&#127968;</span> Главная</a>
    <a class="nav-item" href="chat.html"><span class="nav-item-icon">&#128172;</span> Чат</a>
    <a class="nav-item" href="images.html"><span class="nav-item-icon">&#128444;</span> Изображения</a>
    <a class="nav-item" href="video.html"><span class="nav-item-icon">&#127916;</span> Видео</a>
    <a class="nav-item" href="gallery.html"><span class="nav-item-icon">&#128248;</span> Галерея</a>
    <a class="nav-item" href="prompts.html"><span class="nav-item-icon">&#128203;</span> Промпты</a>
    <a class="nav-item active" href="models.html"><span class="nav-item-icon">&#129302;</span> Модели</a>
  </nav>
  <div class="sidebar-bottom">
    <a class="nav-item" href="settings.html"><span class="nav-item-icon">&#9881;</span> Настройки</a>
  </div>
</aside>

<main class="main">
  <h1 class="page-title">Коллекция моделей</h1>
  <p class="page-subtitle">Выберите модель для чата, генерации изображений или видео</p>

  <div class="tabs">
    <div class="tab-item active">Тип генерации</div>
    <div class="tab-item">Провайдеры <span class="tab-badge">0</span></div>
  </div>

  <div class="filter-row" id="typeFilters">
    <div class="filter-pill active">Все</div>
    <div class="filter-pill">Текст</div>
    <div class="filter-pill">Изображение</div>
    <div class="filter-pill">Видео</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input class="search-input" type="text" placeholder="Поиск моделей..." id="searchInput">
  </div>

  <div class="models-grid" id="modelsGrid"></div>
</main>

<script>
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

const models = [
  { name: 'Grok Imagine Video', provider: 'xAI', tags: ['Текст \u2192 Видео'], gradient: 'linear-gradient(135deg, #1a1a2e, #2d4a7a)' },
  { name: 'Gemini 3 pro', provider: 'Google', tags: ['Текст \u2192 Текст', 'Изображение \u2192 Текст'], gradient: 'linear-gradient(135deg, #1a2e1a, #2a7a4a)' },
  { name: 'GPT 5.2 Codex', provider: 'OpenAI', tags: ['Текст \u2192 Текст', 'Код'], gradient: 'linear-gradient(135deg, #2e1a2e, #7a2a6a)' },
  { name: 'GPT 5.2', provider: 'OpenAI', tags: ['Текст \u2192 Текст'], gradient: 'linear-gradient(135deg, #1a1a1a, #4a4a4a)' },
  { name: 'GPT 5.2 PRO', provider: 'OpenAI', tags: ['Текст \u2192 Текст', 'Аудио'], gradient: 'linear-gradient(135deg, #2e2e1a, #6a6a2a)' },
  { name: 'Claude 4 Sonnet', provider: 'Anthropic', tags: ['Текст \u2192 Текст'], gradient: 'linear-gradient(135deg, #1a1a2e, #4a3a7a)' },
  { name: 'GPT 4o', provider: 'OpenAI', tags: ['Текст \u2192 Текст', 'Изображение'], gradient: 'linear-gradient(135deg, #1a2e2e, #2a6a6a)' },
  { name: 'GPT 5.3 Codex', provider: 'OpenAI', tags: ['Текст \u2192 Текст', 'Код'], gradient: 'linear-gradient(135deg, #2e1a1a, #7a3a3a)' },
  { name: 'Midjourney v6', provider: 'Midjourney', tags: ['Текст \u2192 Изображение'], gradient: 'linear-gradient(135deg, #1a1a2e, #3a3a7a)' },
];

const grid = document.getElementById('modelsGrid');
function renderModels(filter) {
  grid.innerHTML = '';
  const filtered = filter ? models.filter(m => m.name.toLowerCase().includes(filter.toLowerCase())) : models;
  filtered.forEach(m => {
    const card = document.createElement('div');
    card.className = 'model-card';
    card.innerHTML = `
      <div class="model-card-gradient" style="background: ${m.gradient};">
        <div class="model-provider">${m.provider}</div>
        <div class="model-name">${m.name}</div>
      </div>
      <div class="model-tags">
        ${m.tags.map(t => `<span class="model-tag">${t}</span>`).join('')}
      </div>
    `;
    grid.appendChild(card);
  });
}
renderModels('');

document.getElementById('searchInput').addEventListener('input', function() {
  renderModels(this.value);
});

// Filter pills
document.querySelectorAll('.filter-row').forEach(row => {
  row.addEventListener('click', e => {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    row.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
  });
});

// Tabs
document.querySelectorAll('.tab-item').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
</body>
</html>
