<style>
/* ===== Models Page Specific ===== */

.page-body {
    padding: 24px 32px 48px;
}

/* Search */
.search-row {
    margin-bottom: 16px;
}

/* Filter pills */
.filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
}

/* Section header */
.section-label {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    margin-bottom: 16px;
}

/* Recommended row */
.recommended-row {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 40px;
    -webkit-overflow-scrolling: touch;
}
.recommended-row::-webkit-scrollbar { height: 4px; }
.recommended-row::-webkit-scrollbar-track { background: transparent; }
.recommended-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.recommended-row .model-card {
    min-width: 260px;
    flex: 1;
}

/* Models grid */
.models-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

/* Model card */
.model-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: box-shadow var(--transition), border-color var(--transition), transform 0.2s ease;
    cursor: default;
}
.model-card:hover {
    box-shadow: var(--shadow-lg);
    border-color: transparent;
    transform: translateY(-2px);
}

.model-gradient {
    height: 80px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
}

.model-gradient-letter {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--text-secondary);
}

.model-provider {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 12px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
}

.model-body {
    padding: 16px;
}

.model-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 4px;
}

.model-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.4;
    margin-bottom: 14px;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* Metric bars */
.model-metrics {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
}

.metric-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.metric-label {
    font-size: 11px;
    color: var(--text-tertiary);
    width: 60px;
    flex-shrink: 0;
}

.metric-track {
    flex: 1;
    height: 4px;
    background: var(--border-light);
    border-radius: 2px;
    overflow: hidden;
}

.metric-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
}

.metric-fill.quality { background: var(--accent); }
.metric-fill.speed { background: #3B82F6; }
.metric-fill.price { background: var(--green); }

/* Best for */
.model-bestfor {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
}
.model-bestfor svg {
    flex-shrink: 0;
    color: var(--text-tertiary);
}

/* Tags */
.model-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
}

.model-tag {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
}

/* Footer / status */
.model-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-top: 12px;
    border-top: 1px solid var(--border-light);
}

.status-connected {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
}

.btn-use {
    padding: 7px 18px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    background: var(--accent);
    color: var(--text-inverse);
    border: none;
    cursor: pointer;
    transition: background var(--transition);
}
.btn-use:hover {
    background: var(--accent-hover);
}

/* Empty state */
.empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-tertiary);
    font-size: 14px;
}

/* ===== Responsive ===== */
@media (max-width: 1024px) {
    .models-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
    .page-header { padding: 68px 20px 0; }
    .page-body { padding: 20px 20px 100px; }
    .models-grid { grid-template-columns: 1fr; }
    .recommended-row { gap: 12px; }
    .recommended-row .model-card { min-width: 240px; }
}
</style>

            '</div>' +
            '<div class="model-tags">' +
                m.tags.map(function(t) { return '<span class="model-tag">' + t + '</span>'; }).join('') +
            '</div>' +
            '<div class="model-footer">' + statusHtml + '</div>' +
        '</div>' +
    '</div>';
}

function renderModels() {
    var searchVal = document.getElementById('searchInput').value.toLowerCase();

    var recommended = [];
    var rest = [];

    models.forEach(function(m) {
        var matchesSearch = !searchVal ||
            m.name.toLowerCase().indexOf(searchVal) !== -1 ||
            m.provider.toLowerCase().indexOf(searchVal) !== -1 ||
            m.desc.toLowerCase().indexOf(searchVal) !== -1;
        var matchesCategory = activeCategory === 'all' || m.tags.indexOf(activeCategory) !== -1;

        if (!matchesSearch || !matchesCategory) return;

        if (m.recommended) {
            recommended.push(m);
        } else {
            rest.push(m);
        }
    });

    // Recommended section
    var recSection = document.getElementById('recommendedSection');
    var recGrid = document.getElementById('recommendedGrid');
    if (recommended.length > 0) {
        recSection.style.display = '';
        recGrid.innerHTML = recommended.map(buildCard).join('');
    } else {
        recSection.style.display = 'none';
    }

    // All models section
    var allSection = document.getElementById('allModelsSection');
    var allGrid = document.getElementById('modelsGrid');
    if (rest.length > 0) {
        allSection.style.display = '';
        allGrid.innerHTML = rest.map(buildCard).join('');
    } else if (recommended.length === 0) {
        allSection.style.display = '';
        allGrid.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
    } else {
        allSection.style.display = 'none';
    }
}

renderModels();

document.getElementById('searchInput').addEventListener('input', renderModels);

document.getElementById('filterRow').addEventListener('click', function(e) {
    var pill = e.target.closest('.chip');
    if (!pill) return;
    this.querySelectorAll('.chip').forEach(function(p) { p.classList.remove('active'); });
    pill.classList.add('active');
    activeCategory = pill.getAttribute('data-category');
    renderModels();
});
</script>
</body>
</html>
