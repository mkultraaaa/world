<head>

<style>
/* ===== Settings Page Specific ===== */

.page-body {
    padding: 24px 32px 48px;
    max-width: 820px;
}

/* Section label */
.section-label {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    margin-bottom: 16px;
}

/* ===== Balance Card ===== */
.balance-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 28px 28px 24px;
    margin-bottom: 36px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow var(--transition);
}
.balance-card:hover {
    box-shadow: var(--shadow-md);
}

.balance-inner {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
}

.balance-left {
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.balance-amount {
    font-size: 36px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
    letter-spacing: -0.5px;
}

.balance-label {
    font-size: 14px;
    color: var(--text-tertiary);
}

.balance-sparkline {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    height: 44px;
    padding-top: 8px;
}

.sparkline-bar {
    width: 6px;
    border-radius: 3px;
    background: var(--accent-light);
    transition: background var(--transition);
}
.sparkline-bar.hi {
    background: var(--accent);
}

/* ===== Top-up Section ===== */
.topup-section {
    margin-bottom: 36px;
}

.packages-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 20px;
}

.package-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color var(--transition), box-shadow var(--transition), transform 0.15s ease;
    position: relative;
}
.package-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
}
.package-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), var(--shadow-md);
    background: var(--accent-50);
}

.package-amount {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
}

.package-bonus {
    font-size: 12px;
    color: var(--green);
    font-weight: 500;
}

.package-badge {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    padding: 2px 12px;
    border-radius: var(--radius-pill);
    font-size: 10px;
    font-weight: 600;
    white-space: nowrap;
    letter-spacing: 0.02em;
}
.package-badge.popular {
    background: var(--accent);
    color: var(--text-inverse);
}
.package-badge.value {
    background: var(--green);
    color: var(--text-inverse);
}

/* ===== History Section ===== */
.history-section {
    margin-bottom: 36px;
}

.history-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
}

.history-header {
    display: grid;
    grid-template-columns: 120px 1fr 100px;
    padding: 12px 20px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
}

.history-row {
    display: grid;
    grid-template-columns: 120px 1fr 100px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-light);
    font-size: 14px;
    align-items: center;
    transition: background var(--transition);
}
.history-row:last-child {
    border-bottom: none;
}
.history-row:hover {
    background: var(--bg);
}

.history-date {
    color: var(--text-tertiary);
    font-size: 13px;
}

.history-desc {
    color: var(--text-secondary);
    font-size: 13px;
}

.history-amount {
    text-align: right;
    font-weight: 600;
    font-size: 13px;
}
.history-amount.positive {
    color: var(--green);
}
.history-amount.negative {
    color: var(--text-secondary);
}

/* ===== Profile Section ===== */
.profile-section {
    margin-bottom: 36px;
}

.profile-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
}

.profile-field {
    margin-bottom: 20px;
}
.profile-field:last-of-type {
    margin-bottom: 0;
}

.profile-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
}

.profile-input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 14px;
    font-family: var(--font);
    color: var(--text-primary);
    background: var(--surface);
    outline: none;
    transition: border-color var(--transition), box-shadow var(--transition);
}
.profile-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
}

.profile-plan-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.profile-plan-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-light);
    padding: 5px 14px;
    border-radius: var(--radius-sm);
}

.profile-actions {
    margin-top: 24px;
    display: flex;
    gap: 12px;
}

/* ===== Responsive ===== */
@media (max-width: 1024px) {
    .packages-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
    .page-header { padding: 60px 16px 0; }
    .page-body { padding: 20px 16px 100px; }
    .packages-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .balance-inner { flex-direction: column; }
    .balance-amount { font-size: 28px; }
    .history-header, .history-row {
        grid-template-columns: 80px 1fr 70px;
        padding: 10px 12px;
        font-size: 12px;
    }
    .profile-actions {
        flex-direction: column;
    }
    .profile-actions .btn-primary,
    .profile-actions .btn-secondary {
        width: 100%;
    }
}
</style>

<script>
/* Toggle sidebar (mobile) */
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
}

/* Package card selection */
document.getElementById('packagesGrid').addEventListener('click', function(e) {
    var card = e.target.closest('.package-card');
    if (!card) return;
    this.querySelectorAll('.package-card').forEach(function(c) { c.classList.remove('selected'); });
    card.classList.add('selected');
});
</script>
