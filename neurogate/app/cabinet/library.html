<style>
/* ===== Library Page Styles ===== */

/* Sub-tabs */
.lib-tabs {
    display: flex;
    gap: 4px;
    padding: 24px 32px 0;
    border-bottom: 1px solid var(--border);
}
.lib-tab {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: color var(--transition), border-color var(--transition);
    margin-bottom: -1px;
}
.lib-tab:hover {
    color: var(--text-primary);
}
.lib-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
}

.lib-panel {
    display: none;
    padding: 24px 32px 32px;
    animation: fadeIn 0.25s ease;
}
.lib-panel.active {
    display: block;
}

/* ===== History Tab ===== */
.history-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
}
.history-toolbar .search-wrap {
    flex: 1;
    max-width: 400px;
}

.history-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
}

.history-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-light);
    cursor: pointer;
    transition: background var(--transition);
}
.history-item:last-child {
    border-bottom: none;
}
.history-item:hover {
    background: var(--accent-50);
}

.history-icon {
    width: 38px;
    height: 38px;
    border-radius: var(--radius-sm);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: var(--text-secondary);
}

.history-prompt {
    flex: 1;
    min-width: 0;
    font-size: 14px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.history-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}

.model-pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: var(--radius-pill);
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
}

.history-time {
    font-size: 13px;
    color: var(--text-tertiary);
    white-space: nowrap;
    min-width: 80px;
    text-align: right;
}

.history-arrow {
    color: var(--text-tertiary);
    flex-shrink: 0;
}

/* ===== Generations Tab ===== */
.gen-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}
.gen-filters {
    display: flex;
    gap: 8px;
    flex: 1;
    flex-wrap: wrap;
}
.gen-count {
    font-size: 13px;
    color: var(--text-tertiary);
    margin-left: auto;
    white-space: nowrap;
}

.gen-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
}

.gen-card {
    position: relative;
    aspect-ratio: 1;
    border-radius: var(--radius-lg);
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: box-shadow var(--transition), border-color var(--transition), transform 0.2s ease;
}
.gen-card:hover {
    box-shadow: var(--shadow-lg);
    border-color: transparent;
    transform: translateY(-2px);
}

.gen-card-bg {
    width: 100%;
    height: 100%;
}

.gen-card-fav {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-tertiary);
    z-index: 2;
}
.gen-card-fav.is-fav {
    color: #EF4444;
}

.gen-card-type {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 3px 8px;
    border-radius: var(--radius-pill);
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 4px;
}

.gen-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 14px;
    opacity: 0;
    transition: opacity 0.2s ease;
    z-index: 1;
}
.gen-card:hover .gen-overlay {
    opacity: 1;
}

.gen-overlay-prompt {
    font-size: 12px;
    color: rgba(255,255,255,0.9);
    line-height: 1.4;
    margin-bottom: 10px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.gen-overlay-actions {
    display: flex;
    gap: 6px;
}
.gen-overlay-btn {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    cursor: pointer;
    transition: background var(--transition);
}
.gen-overlay-btn:hover {
    background: rgba(255,255,255,0.35);
}

/* ===== Placeholder backgrounds for mock images ===== */
.grad-1 { background: #F8F9FC; }
.grad-2 { background: #F1F3F9; }
.grad-3 { background: #FAFBFD; }
.grad-4 { background: #F5F3FF; }
.grad-5 { background: #F8F9FC; }
.grad-6 { background: #F1F3F9; }
.grad-7 { background: #FAFBFD; }
.grad-8 { background: #F5F3FF; }
.grad-9 { background: #F8F9FC; }
.grad-10 { background: #F1F3F9; }
.grad-11 { background: #FAFBFD; }
.grad-12 { background: #F5F3FF; }

/* ===== Responsive ===== */
@media (max-width: 1024px) {
    .gen-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 768px) {
    .lib-tabs {
        padding: 16px 16px 0;
    }
    .lib-panel {
        padding: 16px 16px 24px;
    }
    .gen-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
    }
    .history-toolbar {
        flex-direction: column;
        align-items: stretch;
    }
    .history-toolbar .search-wrap {
        max-width: none;
    }
    .history-meta {
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
    }
    .history-time {
        min-width: auto;
    }
    .page-header {
        padding: 60px 16px 0;
    }
    .gen-toolbar {
        flex-direction: column;
        align-items: flex-start;
    }
    .gen-count {
        margin-left: 0;
    }
}
</style>

var typeLabels = {
    image: 'Изображение',
    video: 'Видео'
};

/* ===== Render History ===== */
function renderHistory(items) {
    var list = document.getElementById('historyList');
    if (items.length === 0) {
        list.innerHTML = '<div style="padding: 40px; text-align: center; color: var(--text-tertiary);">Ничего не найдено</div>';
        return;
    }
    var html = '';
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        html += '<div class="history-item" onclick="openHistoryItem(' + i + ')">';
        html += '  <div class="history-icon ' + item.type + '">' + typeIcons[item.type] + '</div>';
        html += '  <div class="history-prompt">' + escapeHtml(item.prompt) + '</div>';
        html += '  <div class="history-meta">';
        html += '    <span class="model-pill">' + escapeHtml(item.model) + '</span>';
        html += '    <span class="history-time">' + item.time + '</span>';
        html += '  </div>';
        html += '  <div class="history-arrow"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>';
        html += '</div>';
    }
    list.innerHTML = html;
}

/* ===== Render Generations ===== */
function renderGenerations(items) {
    var grid = document.getElementById('genGrid');
    var count = document.getElementById('genCount');
    count.textContent = items.length + ' ' + pluralize(items.length, 'элемент', 'элемента', 'элементов');
    if (items.length === 0) {
        grid.innerHTML = '<div style="grid-column: 1 / -1; padding: 60px; text-align: center; color: var(--text-tertiary);">Нет генераций</div>';
        return;
    }
    var html = '';
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        html += '<div class="gen-card" data-type="' + item.type + '" data-fav="' + item.fav + '">';
        html += '  <div class="gen-card-bg ' + item.grad + '"></div>';

        /* Type badge */
        html += '  <div class="gen-card-type">';
        if (item.type === 'video') {
            html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
        }
        html += typeLabels[item.type] || '';
        html += '  </div>';

        /* Favorite badge */
        html += '  <div class="gen-card-fav' + (item.fav ? ' is-fav' : '') + '" onclick="event.stopPropagation(); toggleFav(this)">';
        if (item.fav) {
            html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
        } else {
            html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
        }
        html += '  </div>';

        /* Hover overlay */
        html += '  <div class="gen-overlay">';
        html += '    <div class="gen-overlay-prompt">' + escapeHtml(item.prompt) + '</div>';
        html += '    <div class="gen-overlay-actions">';
        html += '      <button class="gen-overlay-btn" title="Скачать"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>';
        html += '      <button class="gen-overlay-btn" title="Копировать"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>';
        html += '      <button class="gen-overlay-btn" title="В избранное" onclick="event.stopPropagation(); toggleFav(this.closest(\'.gen-card\').querySelector(\'.gen-card-fav\'))"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>';
        html += '      <button class="gen-overlay-btn" title="Использовать повторно"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>';
        html += '    </div>';
        html += '  </div>';

        html += '</div>';
    }
    grid.innerHTML = html;
}

/* ===== Tab Switching ===== */
function switchTab(tab) {
    var tabs = document.querySelectorAll('.lib-tab');
    var panels = document.querySelectorAll('.lib-panel');
    for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tab);
    }
    for (var i = 0; i < panels.length; i++) {
        panels[i].classList.toggle('active', panels[i].id === 'panel-' + tab);
    }
}

/* ===== History Search ===== */
function filterHistory() {
    var query = document.getElementById('historySearch').value.toLowerCase();
    if (!query) {
        renderHistory(historyItems);
        return;
    }
    var filtered = historyItems.filter(function(item) {
        return item.prompt.toLowerCase().indexOf(query) !== -1 ||
               item.model.toLowerCase().indexOf(query) !== -1;
    });
    renderHistory(filtered);
}

/* ===== Generation Filters ===== */
function filterGen(filter, btn) {
    var chips = document.querySelectorAll('.gen-filters .chip');
    for (var i = 0; i < chips.length; i++) {
        chips[i].classList.toggle('active', chips[i] === btn);
    }
    var filtered;
    if (filter === 'all') {
        filtered = generationItems;
    } else if (filter === 'fav') {
        filtered = generationItems.filter(function(item) { return item.fav; });
    } else {
        filtered = generationItems.filter(function(item) { return item.type === filter; });
    }
    renderGenerations(filtered);
}

/* ===== Toggle Favorite ===== */
function toggleFav(el) {
    el.classList.toggle('is-fav');
    var isFav = el.classList.contains('is-fav');
    if (isFav) {
        el.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    } else {
        el.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
    }
}

    /* In a real app, this would open the session detail */

function clearHistory() {
    if (confirm('Очистить всю историю?')) {
        historyItems = [];
        renderHistory([]);
    }
}

/* ===== Sidebar Toggle ===== */
function toggleSidebar() {
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('overlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('show');
}

/* ===== Helpers ===== */
function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}

function pluralize(n, one, few, many) {
    var mod10 = n % 10;
    var mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return one;
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return few;
    return many;
}

/* ===== Init ===== */
renderHistory(historyItems);
renderGenerations(generationItems);
