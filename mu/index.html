    }
    s.text = old.textContent;
    parent.removeChild(old);
    await new Promise(function(res, rej){
      if (s.src) { s.onload=res; s.onerror=rej; parent.appendChild(s); }
      else { parent.appendChild(s); res(); }
    });
  }
}
async function unlock(){
  var e=document.getElementById('err');e.textContent='';

  try{
    var salt=b64(S), iv=b64(I), ct=b64(C);
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    var k=await crypto.subtle.deriveKey({name:'PBKDF2',hash:'SHA-256',salt:salt,iterations:100000},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},k,ct);
    var html=new TextDecoder().decode(dec);
