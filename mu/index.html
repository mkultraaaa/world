function b64ToBytes(b64) {
  var bin = atob(b64);
  var out = new Uint8Array(bin.length);
  for (var i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out;
}

async function unlock() {
  var err = document.getElementById('err');
  err.textContent = '';
  var pw = (document.getElementById('pw').value || '').normalize('NFKC');
  if (!pw) { err.textContent = 'Введите пароль.'; return; }

  try {
    var salt = b64ToBytes(PAYLOAD.kdf.salt_b64);
    var iv = b64ToBytes(PAYLOAD.cipher.iv_b64);
    var ct = b64ToBytes(PAYLOAD.cipher.ct_b64);

    var keyMaterial = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']
    );
    var key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', hash: 'SHA-256', salt: salt, iterations: PAYLOAD.kdf.iterations },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );

    var plainBuf = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv },
      key,
      ct
    );

    var html = new TextDecoder().decode(plainBuf);

    // Use DOMParser + manual script execution (NOT document.write)
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');

    // Apply styles
    var styles = doc.querySelectorAll('style');
    for (var i = 0; i < styles.length; i++) {
      document.head.appendChild(styles[i].cloneNode(true));
    }

    // Replace body content (without scripts)
    document.body.innerHTML = doc.body.innerHTML;

    // Execute scripts in order (handling both src and inline)
    var scripts = doc.querySelectorAll('script');
    await execScriptsInOrder(scripts, 0);

  } catch(e) {
    err.textContent = 'Неверный пароль или ошибка: ' + e.message;
  }
}

function execScriptsInOrder(scripts, idx) {
  if (idx >= scripts.length) return Promise.resolve();
  var old = scripts[idx];
  var s = document.createElement('script');

  if (old.src) {
    // External script — load then continue
    return new Promise(function(resolve, reject) {
      s.src = old.src;
      s.onload = function() { resolve(); };
      s.onerror = function() { console.warn('Script load failed: ' + old.src); resolve(); };
      document.body.appendChild(s);
    }).then(function() {
      return execScriptsInOrder(scripts, idx + 1);
    });
  } else {
    // Inline script
    s.textContent = old.textContent;
    document.body.appendChild(s);
    return execScriptsInOrder(scripts, idx + 1);
  }
}
